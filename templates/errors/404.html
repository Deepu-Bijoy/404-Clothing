{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:60vh;">
    <h1 class="font-heading" style="font-size:8rem;color:var(--border-light);line-height:1;">404</h1>
    <h2 class="font-heading mb-3">Page Not Found</h2>
    <p style="color:var(--text-muted);max-width:380px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('shop.index') }}" class="btn btn-dark px-5 mt-3"><i class="fas fa-home me-2"></i>Go Home</a>
</div>
{% endblock %}
